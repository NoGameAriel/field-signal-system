<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARE — Immigration Legal State · Field & Signal</title>
  <meta name="description" content="A conflict-aware reconciliation engine for immigration legal state. Demonstration prototype by Field & Signal." />

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- React + Babel -->

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { background: #07070D; color: #D0D0C8; font-family: 'DM Mono', 'Courier New', monospace; min-height: 100vh; }
    #root { min-height: 100vh; }
    input, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #1A1A24; }

    @keyframes fadeIn  { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink   { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .fade-in   { animation: fadeIn 0.3s ease both; }
    .layer-card, .conflict-card { transition: border-color 0.15s; }
  </style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">

const DEMO_ACTIONS = [
  { type: "HOLD",       color: "#C0392B", target: "L2",    immigrant: "We stopped the removal order from being carried out.", citizen: "Enforcement action blocked pending resolution of court conflict.", caseworker: "Hold issued: removal execution blocked, L2. Binding override from L4." },

  { type: "SYNC",       color: "#4A90D9", target: "L2",    immigrant: "We told the enforcement agency about your asylum application.", citizen: "Credible fear finding propagated to enforcement. Automatic stay review initiated.", caseworker: "Sync: credible fear finding (L3, Oct 3 2024) → L2. Stay review triggered." },
  { type: "CORRECTION", color: "#E67E22", target: "L3",    immigrant: "We made sure the asylum office knows about the old removal order, so they have the full picture.", citizen: "Asylum adjudicator flagged: active removal order exists.", caseworker: "Correction: removal order status → L3 adjudicator. Case flagged for dual-track awareness." },
  { type: "ESCALATE",   color: "#8E44AD", target: "HUMAN", immigrant: "A human reviewer has been assigned to your case to make sure everything is handled correctly.", citizen: "Human review assigned due to data age exceeding threshold.", caseworker: "Escalation: data age (1,884d) exceeds threshold. Human reviewer assigned before any enforcement action." },

const CASE_REGISTRY = {
  "A219847331": { person: DEMO_PERSON, layers: DEMO_LAYERS, conflicts: DEMO_CONFLICTS, actions: DEMO_ACTIONS },
};

function normalizeANumber(raw) {
  return raw.replace(/[^0-9]/g, "").padStart(9, "0");
}

// ─── UI ATOMS ─────────────────────────────────────────────────────────────────

function Pill({ label, color }) {
  return (
    <span style={{
      fontSize: "9px", letterSpacing: "0.12em", fontWeight: 700,
      padding: "3px 8px", borderRadius: "20px", display: "inline-block",
      color, background: color + "18", border: `1px solid ${color}44`, whiteSpace: "nowrap",
    }}>{label}</span>
  );
}

function Accordion({ title, children, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div style={{ background: "#0A0A14", borderRadius: "6px", border: "1px solid #141420", overflow: "hidden", marginBottom: "8px" }}>
      <div onClick={() => setOpen(!open)} style={{ padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", userSelect: "none" }}>
        <div style={{ fontSize: "10px", letterSpacing: "0.16em", color: open ? "#C0C0B8" : "#444", fontWeight: 600 }}>{title}</div>
        <div style={{ color: "#333", fontSize: "12px", transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "none" }}>▾</div>
      </div>
      {open && <div className="fade-in" style={{ padding: "0 16px 16px" }}>{children}</div>}
    </div>
  );
}

const STATUS_COLOR = { complete: "#27AE60", pending: "#E67E22", critical: "#C0392B" };

function LayerCard({ layer, lens }) {
  const [open, setOpen] = useState(false);
  const d = layer[lens];
  return (
    <div className="layer-card" onClick={() => setOpen(!open)} style={{
      background: "#0E0E18", borderRadius: "6px", marginBottom: "8px", cursor: "pointer",
      border: `1px solid ${open ? layer.color + "44" : "#1A1A26"}`,
      borderLeft: `3px solid ${layer.color}`, overflow: "hidden",
    }}>
      <div style={{ padding: "14px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "10px" }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: "9px", color: layer.color, letterSpacing: "0.14em", fontWeight: 700, marginBottom: "4px" }}>
              {lens === "caseworker" ? layer.code : layer.agency}
            </div>
            <div style={{ fontSize: "13px", color: "#D0D0C8", fontFamily: "'DM Sans',sans-serif", fontWeight: 500, lineHeight: "1.4" }}>{d.what}</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "6px", flexShrink: 0 }}>
            <Pill label={d.status} color={STATUS_COLOR[layer.statusCode]} />
            <span style={{ color: "#222", fontSize: "11px" }}>{open ? "▲" : "▼"}</span>
          </div>
        </div>
      </div>
      {open && (
        <div className="fade-in" style={{ padding: "0 16px 16px", borderTop: "1px solid #141420" }}>
          <div style={{ fontSize: "13px", color: "#888", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7", margin: "14px 0 12px" }}>{d.detail}</div>
          {lens === "caseworker" && (
            <div style={{ display: "grid", gap: "6px", marginBottom: "12px" }}>
              {[["Authority", d.authority], ["Data age", d.staleness], ["Propagation", d.propagation]].map(([k,v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: "10px" }}>
                  <span style={{ fontSize: "10px", color: "#444" }}>{k}</span>
                  <span style={{ fontSize: "10px", color: v && v.includes("NOT") ? "#C0392B" : "#888", textAlign: "right", fontFamily: "'DM Mono',monospace" }}>{v}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{ padding: "10px 12px", background: "#07070D", borderRadius: "4px", border: "1px solid #141420" }}>
            <div style={{ fontSize: "9px", color: "#333", letterSpacing: "0.14em", marginBottom: "4px" }}>
              {lens === "immigrant" ? "WHAT THIS MEANS FOR YOU" : lens === "citizen" ? "WHY THIS MATTERS" : "NEXT ACTION"}
            </div>
            <div style={{ fontSize: "12px", color: "#C0C0B8", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.6" }}>{d.next}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function ConflictCard({ conflict, lens }) {
  const [open, setOpen] = useState(false);
  const LC = { L1:"#4A90D9", L2:"#C0392B", L3:"#27AE60", L4:"#8E44AD" };
  const tc = conflict.type === "AUTHORITY" ? "#C0392B" : conflict.type === "SYNC GAP" ? "#E67E22" : "#8E44AD";
  return (
    <div className="conflict-card" onClick={() => setOpen(!open)} style={{
      background: "#0E0E18", borderRadius: "6px", marginBottom: "8px", cursor: "pointer",
      border: `1px solid ${open ? tc + "44" : "#1A1A26"}`, borderLeft: `3px solid ${tc}`, overflow: "hidden",
    }}>
      <div style={{ padding: "14px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "10px" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "7px", alignItems: "center" }}>
              <Pill label={conflict.type} color={tc} />
              {conflict.layers.map(l => <Pill key={l} label={l} color={LC[l]} />)}
              {conflict.blocked && <Pill label="🚫 BLOCKED" color="#C0392B" />}
            </div>
            <div style={{ fontSize: "13px", color: "#D0D0C8", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.4" }}>{conflict[lens]}</div>
          </div>
          <span style={{ color: "#222", fontSize: "11px", flexShrink: 0 }}>{open ? "▲" : "▼"}</span>
        </div>
      </div>
      {open && (
        <div className="fade-in" style={{ padding: "0 16px 14px", borderTop: "1px solid #141420" }}>
          <div style={{ marginTop: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: "9px", color: "#333", letterSpacing: "0.14em" }}>SEVERITY</span>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{ width: "80px", height: "3px", background: "#141420", borderRadius: "2px" }}>
                <div style={{ width: conflict.severity + "%", height: "100%", background: tc, borderRadius: "2px" }} />
              </div>
              <span style={{ fontSize: "11px", color: tc, fontWeight: 700 }}>{conflict.severity}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ActionRow({ action, lens, idx }) {
  return (
    <div style={{
      display: "flex", gap: "10px", alignItems: "flex-start",
      padding: "10px 12px", marginBottom: "6px",
      background: "#0A0A12", border: "1px solid #141420",
      borderLeft: `3px solid ${action.color}`, borderRadius: "4px",
      animation: `fadeIn 0.3s ease ${idx * 0.06}s both`,
    }}>
      <div style={{ minWidth: "76px" }}>
        <div style={{ fontSize: "9px", color: action.color, letterSpacing: "0.12em", fontWeight: 700 }}>{action.type}</div>
        <div style={{ fontSize: "9px", color: "#333", marginTop: "2px" }}>→ {action.target}</div>
      </div>
      <div style={{ fontSize: "12px", color: "#888", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.5" }}>{action[lens]}</div>
    </div>
  );
}

// ─── DISCLAIMER ───────────────────────────────────────────────────────────────

function Disclaimer({ onAck }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#07070D", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
      <div style={{ maxWidth: "400px", width: "100%", animation: "fadeIn 0.4s ease" }}>
        <div style={{ fontSize: "8px", letterSpacing: "0.24em", color: "#2A2A3A", marginBottom: "16px", textAlign: "center" }}>FIELD & SIGNAL · CARE</div>
        <div style={{ padding: "20px", background: "#140808", border: "1px solid #2A1010", borderRadius: "6px", marginBottom: "16px" }}>
          <div style={{ fontSize: "11px", color: "#C0392B", letterSpacing: "0.14em", fontWeight: 700, marginBottom: "10px" }}>DEMONSTRATION PROTOTYPE</div>
          <div style={{ fontSize: "13px", color: "#C8956A", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7" }}>
            This tool does not connect to any government database. No real records are stored, retrieved, or processed. A-numbers entered here are not transmitted anywhere.
          </div>
          <div style={{ fontSize: "13px", color: "#C8956A", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7", marginTop: "10px" }}>
            This is a design prototype built to show what a unified immigration legal state system could look like.
          </div>
        </div>
        <button onClick={onAck} style={{
          width: "100%", padding: "14px", background: "#1A2A4A", color: "#4A90D9",
          border: "1px solid #1A3A6A", borderRadius: "6px", cursor: "pointer",
          fontFamily: "'DM Mono',monospace", fontSize: "11px", letterSpacing: "0.14em", fontWeight: 600,
        }}>
          I UNDERSTAND — CONTINUE
        </button>
        <div style={{ marginTop: "12px", fontSize: "10px", color: "#1A1A28", textAlign: "center", lineHeight: "1.7" }}>
          Field & Signal · Diagnostic infrastructure for systems under stress
        </div>
      </div>
    </div>
  );
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────

function SearchScreen({ onFound, onDemo }) {
  const [query, setQuery] = useState("");
  const [status, setStatus] = useState("idle");

  function handleSearch(e) {
    e.preventDefault();
    const key = "A" + normalizeANumber(query);
    if (key === "A") return;
    setStatus("searching");
    setTimeout(() => {
      const rec = CASE_REGISTRY[key] || CASE_REGISTRY["A219847331".replace("A","")];
      // Only match exact registry entries
      const exact = Object.keys(CASE_REGISTRY).find(k => k === "A" + normalizeANumber(query) || k === normalizeANumber(query));
      if (exact) {
        onFound(CASE_REGISTRY[exact]);
      } else {
        setStatus("notfound");
      }
    }, 600);
  }

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 20px" }}>
      <div style={{ width: "100%", maxWidth: "400px", animation: "fadeIn 0.4s ease" }}>
        <div style={{ textAlign: "center", marginBottom: "32px" }}>
          <div style={{ fontSize: "8px", letterSpacing: "0.26em", color: "#2A2A3A", marginBottom: "8px" }}>FIELD & SIGNAL · CARE</div>
          <div style={{ fontSize: "22px", fontWeight: 600, fontFamily: "'DM Sans',sans-serif", color: "#E0E0D8", marginBottom: "8px" }}>Immigration Legal State</div>
          <div style={{ fontSize: "12px", color: "#3A3A4A", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7" }}>
            Enter an A-Number to view a unified legal record across all four institutional layers.
          </div>
        </div>

        <form onSubmit={handleSearch} style={{ marginBottom: "10px" }}>
          <div style={{ fontSize: "9px", color: "#333", letterSpacing: "0.16em", marginBottom: "8px" }}>A-NUMBER</div>
          <div style={{ display: "flex", gap: "8px" }}>
            <input
              value={query}
              onChange={e => { setQuery(e.target.value); setStatus("idle"); }}
              placeholder="A-219-847-331"
              autoComplete="off"
              style={{
                flex: 1, padding: "12px 14px",
                background: "#0E0E18",
                border: `1px solid ${status === "notfound" ? "#C0392B55" : "#1A1A26"}`,
                borderRadius: "4px", color: "#E0E0D8",
                fontFamily: "'DM Mono',monospace", fontSize: "14px",
                outline: "none", letterSpacing: "0.08em",
              }}
            />
            <button type="submit" style={{
              padding: "12px 18px", background: "#1A2A4A", color: "#4A90D9",
              border: "1px solid #1A3A6A", borderRadius: "4px",
              fontFamily: "'DM Mono',monospace", fontSize: "10px",
              letterSpacing: "0.12em", cursor: "pointer", fontWeight: 600, minWidth: "64px",
            }}>
              {status === "searching"
                ? <span style={{ display: "inline-block", width: "10px", height: "10px", border: "1.5px solid #4A90D9", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
                : "FIND"}
            </button>
          </div>
          {status === "notfound" && (
            <div style={{ marginTop: "8px", padding: "10px 14px", background: "#140808", border: "1px solid #2A1010", borderRadius: "4px", fontSize: "12px", color: "#C0392B", fontFamily: "'DM Sans',sans-serif" }}>
              No record found for that A-Number. Try the demo below.
            </div>
          )}
        </form>

        <div style={{ padding: "14px", background: "#0A0A12", border: "1px solid #141420", borderRadius: "6px", marginTop: "16px" }}>
          <div style={{ fontSize: "9px", color: "#2A2A3A", letterSpacing: "0.16em", marginBottom: "10px" }}>DEMO RECORD</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "8px" }}>
            <div>
              <div style={{ fontSize: "13px", color: "#888", fontFamily: "'DM Sans',sans-serif" }}>María Elena Vásquez</div>
              <div style={{ fontSize: "11px", color: "#333", fontFamily: "'DM Mono',monospace", marginTop: "2px" }}>A-219-847-331</div>
            </div>
            <button onClick={onDemo} style={{
              padding: "8px 16px", background: "transparent", color: "#4A90D9",
              border: "1px solid #1A3A6A", borderRadius: "4px",
              fontFamily: "'DM Mono',monospace", fontSize: "9px", letterSpacing: "0.12em", cursor: "pointer",
            }}>LOAD DEMO</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── RECORD VIEW ──────────────────────────────────────────────────────────────

function RecordView({ record, onBack }) {
  const [lens, setLens] = useState("immigrant");
  const { person, layers, conflicts, actions } = record;

  const INTROS = {
    immigrant: "This is your legal record. Four different government agencies have information about your case. We show you what each one knows, what conflicts exist, and what is protecting you right now.",
    citizen: "This shows the legal status of one person moving through the U.S. immigration system. Four agencies hold partial, sometimes contradictory records. This system detects those contradictions and enforces legal constraints before any action is taken.",
    caseworker: `Active case: ${person.id}. Reconciliation engine detected 3 conflicts, emitted 5 actions, blocked 1 enforcement request. Data age warning on L2 (critical). Human review assigned.`,
  };

  const SECTION_TITLES = {
    layers:    { immigrant: "WHAT'S HAPPENING — LAYER BY LAYER", citizen: "WHAT'S HAPPENING — LAYER BY LAYER", caseworker: "LAYER STATUS" },
    conflicts: { immigrant: "WHAT THE SYSTEM FOUND AND FIXED",   citizen: "CONFLICTS DETECTED",                caseworker: "CONFLICT REGISTER" },
    actions:   { immigrant: "WHAT THE SYSTEM DID TO PROTECT YOU",citizen: "ACTIONS TAKEN BY THE SYSTEM",       caseworker: "EMITTED ACTION QUEUE" },
    next:      { immigrant: "WHAT YOU NEED TO DO",                citizen: "WHAT HAPPENS NEXT",                caseworker: "OPEN ITEMS" },
  };

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* TOP BAR */}
      <div style={{ background: "#0A0A12", borderBottom: "1px solid #141420", padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "10px", position: "sticky", top: 0, zIndex: 10 }}>
        <div>
          <div style={{ fontSize: "8px", letterSpacing: "0.2em", color: "#2A2A3A", marginBottom: "2px" }}>FIELD & SIGNAL · CARE</div>
          <div style={{ fontSize: "13px", fontWeight: 600, fontFamily: "'DM Sans',sans-serif", color: "#E0E0D8" }}>Immigration Legal State</div>
        </div>
        <button onClick={onBack} style={{ padding: "7px 12px", background: "transparent", color: "#444", border: "1px solid #1A1A26", borderRadius: "4px", fontFamily: "'DM Mono',monospace", fontSize: "9px", letterSpacing: "0.12em", cursor: "pointer" }}>
          ← SEARCH
        </button>
      </div>

      {/* LENS SELECTOR */}
      <div style={{ padding: "14px 16px", background: "#0A0A12", borderBottom: "1px solid #141420" }}>
        <div style={{ fontSize: "9px", color: "#333", letterSpacing: "0.16em", marginBottom: "10px" }}>WHO ARE YOU?</div>
        <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
          {LENSES.map(l => (
            <button key={l.id} onClick={() => setLens(l.id)} style={{
              padding: "12px 14px", textAlign: "left", cursor: "pointer",
              background: lens === l.id ? l.color + "18" : "transparent",
              border: `1px solid ${lens === l.id ? l.color + "55" : "#1A1A26"}`,
              borderLeft: `3px solid ${lens === l.id ? l.color : "#1A1A26"}`,
              borderRadius: "4px", fontFamily: "'DM Sans',sans-serif",
              fontSize: "13px", color: lens === l.id ? l.color : "#555",
              fontWeight: lens === l.id ? 600 : 400, transition: "all 0.2s",
            }}>{l.label}</button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ padding: "16px" }} key={lens}>
        {/* Person card */}
        <div className="fade-in" style={{ padding: "14px", background: "#0E0E18", borderRadius: "6px", border: "1px solid #141420", marginBottom: "16px" }}>
          <div style={{ fontSize: "9px", color: "#333", letterSpacing: "0.16em", marginBottom: "8px" }}>
            {lens === "immigrant" ? "YOUR RECORD" : lens === "citizen" ? "CASE SUBJECT" : "ACTIVE CASE"}
          </div>
          <div style={{ fontSize: "16px", fontWeight: 600, fontFamily: "'DM Sans',sans-serif", marginBottom: "3px" }}>{person.name}</div>
          <div style={{ fontSize: "11px", color: "#555", marginBottom: "12px" }}>{person.id} · From {person.origin} · Entered {person.since}</div>
          <div style={{ fontSize: "12px", color: "#888", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7" }}>{INTROS[lens]}</div>
        </div>

        {/* Caseworker stats */}
        {lens === "caseworker" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px", marginBottom: "16px" }}>
            {[{n:"1",label:"BLOCKED",color:"#C0392B",blink:true},{n:"3",label:"CONFLICTS",color:"#E67E22"},{n:"5",label:"ACTIONS",color:"#4A90D9"}].map(s => (
              <div key={s.label} style={{ padding: "10px", background: "#0E0E18", border: "1px solid #141420", borderRadius: "4px", textAlign: "center" }}>
                <div style={{ fontSize: "22px", fontWeight: 700, color: s.color, animation: s.blink ? "blink 2s infinite" : "none" }}>{s.n}</div>
                <div style={{ fontSize: "8px", color: "#333", letterSpacing: "0.12em" }}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {/* Layers */}
        <Accordion title={SECTION_TITLES.layers[lens]} defaultOpen>
          {layers.map(l => <LayerCard key={l.id} layer={l} lens={lens} />)}
        </Accordion>

        {/* Conflicts */}
        <Accordion title={SECTION_TITLES.conflicts[lens]} defaultOpen={lens !== "immigrant"}>
          {lens === "immigrant" && (
            <div style={{ fontSize: "12px", color: "#666", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7", marginBottom: "12px" }}>
              The system found places where different agencies had information that didn't match — or where an agency was about to act without the full picture. Here's what we caught:
            </div>
          )}
          {conflicts.map(c => <ConflictCard key={c.id} conflict={c} lens={lens} />)}
        </Accordion>

        {/* Actions */}
        <Accordion title={SECTION_TITLES.actions[lens]}>
          {lens === "immigrant" && (
            <div style={{ fontSize: "12px", color: "#666", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.7", marginBottom: "12px" }}>
              These are the steps the system automatically took once it found the conflicts:
            </div>
          )}
          {actions.map((a, i) => <ActionRow key={i} action={a} lens={lens} idx={i} />)}
        </Accordion>

        {/* What's next */}
        <Accordion title={SECTION_TITLES.next[lens]}>
          {lens === "immigrant" && (
            <div style={{ display: "grid", gap: "8px" }}>
              {[
                { icon: "📅", item: "Attend your asylum interview in March 2025. Bring all documents." },
                { icon: "📞", item: "Keep all monthly check-in appointments with ICE. Do not miss them." },
                { icon: "⚖️", item: "Your attorney is managing your BIA appeal. Stay in contact with them." },
                { icon: "✅", item: "You do not need to leave the country right now. The removal is blocked." },
              ].map((n, i) => (
                <div key={i} style={{ display: "flex", gap: "10px", padding: "10px 12px", background: "#0A0A12", borderRadius: "4px", border: "1px solid #141420" }}>
                  <span style={{ fontSize: "16px", flexShrink: 0 }}>{n.icon}</span>
                  <span style={{ fontSize: "13px", color: "#C0C0B8", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.5" }}>{n.item}</span>
                </div>
              ))}
            </div>
          )}
          {lens === "citizen" && (
            <div style={{ display: "grid", gap: "8px" }}>
              {[
                "The system has blocked the removal and synced the missing information across all four agencies.",
                "Her asylum interview in March 2025 will determine whether she is granted protection.",
                "The BIA will rule on her appeal within 14–22 months. That ruling will carry binding authority.",
                "A human reviewer has been assigned to oversee the case before any enforcement action can proceed.",
                "This case illustrates what happens when agencies don't share data — and what a system that catches that could look like.",
              ].map((t, i) => (
                <div key={i} style={{ padding: "10px 12px", background: "#0A0A12", borderRadius: "4px", border: "1px solid #141420", fontSize: "13px", color: "#888", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.6" }}>{t}</div>
              ))}
            </div>
          )}
          {lens === "caseworker" && (
            <div style={{ display: "grid", gap: "6px" }}>
              {[
                { p: "HIGH",   c: "#C0392B", item: "Confirm L2 acknowledgment of BIA docket and credible fear finding." },
                { p: "HIGH",   c: "#C0392B", item: "Verify stay of removal status with BIA before next ICE check-in." },
                { p: "MED",    c: "#E67E22", item: "Confirm L3 adjudicator has been flagged re: active removal order." },
                { p: "MED",    c: "#E67E22", item: "Prepare subject for March 2025 asylum interview." },
                { p: "LOGGED", c: "#444",    item: "Human reviewer assigned. Document chain of custody." },
              ].map((n, i) => (
                <div key={i} style={{ display: "flex", gap: "10px", padding: "10px 12px", background: "#0A0A12", borderRadius: "4px", border: "1px solid #141420", alignItems: "flex-start" }}>
                  <span style={{ fontSize: "8px", color: n.c, fontWeight: 700, letterSpacing: "0.12em", minWidth: "48px", paddingTop: "2px" }}>{n.p}</span>
                  <span style={{ fontSize: "12px", color: "#888", fontFamily: "'DM Sans',sans-serif", lineHeight: "1.5" }}>{n.item}</span>
                </div>
              ))}
            </div>
          )}
        </Accordion>

        <div style={{ marginTop: "24px", padding: "12px", textAlign: "center" }}>
          <div style={{ fontSize: "9px", color: "#1A1A24", lineHeight: "1.8" }}>
            Demonstration prototype · No real person or case represented<br />
            Field &amp; Signal · Diagnostic infrastructure for systems under stress
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [acked, setAcked]           = useState(false);
  const [activeRecord, setActive]   = useState(null);

  if (!acked) return <Disclaimer onAck={() => setAcked(true)} />;

  if (!activeRecord) return (
    <SearchScreen
      onFound={r => setActive(r)}
      onDemo={() => setActive(CASE_REGISTRY["A219847331"])}
    />
  );

  return <RecordView record={activeRecord} onBack={() => setActive(null)} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
