<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groundwork</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F2EFE8;
  --ink: #1C2118;
  --ink-mid: #4A5244;
  --ink-faint: #8A9484;
  --rule: #D8D4C8;
  --green-deep: #1F3D28;
  --green-mid: #2E5C38;
  --green-pale: #E4EDE6;
  --green-border: #B2CCBA;
  --brass: #8A7230;
  --brass-pale: #F5F0E0;
  --brass-border: #D4C078;
  --stone-pale: #EDEAE2;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s;
  background: var(--bg);
}
.screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.slide-left { transform: translateX(-25%); opacity: 0; pointer-events: none; }

/* ── HOME ── */
.home-hero {
  padding: 3rem 1.5rem 2rem;
  border-bottom: 2px solid var(--ink);
}

.wordmark {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--green-deep);
  margin-bottom: 1.5rem;
}

.home-question {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 1rem;
}

.home-sub {
  font-size: 0.72rem;
  color: var(--ink-mid);
  line-height: 1.7;
  letter-spacing: 0.01em;
}

/* ── CAPACITY LIST ── */
.capacity-list { padding-bottom: 5rem; }

.capacity-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s;
}

.capacity-row:hover, .capacity-row:active { background: var(--stone-pale); }

.row-accent { width: 4px; flex-shrink: 0; }

.row-inner {
  flex: 1;
  padding: 1.25rem 1rem 1.25rem 1.1rem;
  min-width: 0;
}

.row-name {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.25rem;
}

.row-question {
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 0.78rem;
  color: var(--ink-mid);
  line-height: 1.45;
}

.row-arrow {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding-right: 1.1rem;
  color: var(--ink-faint);
  font-size: 1.1rem;
}

/* ── CAPACITY DETAIL ── */
.detail-nav {
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 10;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
}

.back-btn {
  background: none; border: none;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mid); cursor: pointer; padding: 0;
}
.back-btn:hover { color: var(--ink); }

.detail-nav-name {
  font-family: 'Libre Baskerville', serif;
  font-size: 0.9rem; font-weight: 700;
  color: var(--ink); margin-left: auto;
}

.detail-color-bar { height: 4px; }

/* Hero */
.detail-hero {
  padding: 1.75rem 1.5rem 1.5rem;
  border-bottom: 1px solid var(--rule);
}

.detail-label {
  font-size: 0.55rem; letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.detail-name {
  font-family: 'Libre Baskerville', serif;
  font-size: 2rem; font-weight: 700;
  line-height: 1.1; color: var(--ink);
  margin-bottom: 0.6rem;
}

.detail-question {
  font-family: 'Libre Baskerville', serif;
  font-style: italic; font-size: 1rem;
  color: var(--ink-mid); line-height: 1.5;
  margin-bottom: 1rem;
}

.detail-why {
  font-size: 0.72rem; color: var(--ink-mid);
  line-height: 1.75;
}

/* What this makes possible */
.detail-unlocks {
  margin: 1.25rem 1.5rem 0;
  padding: 0.85rem 1rem;
  background: var(--green-pale);
  border: 1px solid var(--green-border);
  border-radius: 4px;
}

.unlocks-label {
  font-size: 0.55rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--green-mid);
  margin-bottom: 0.35rem;
}

.unlocks-text {
  font-family: 'Libre Baskerville', serif;
  font-style: italic; font-size: 0.82rem;
  color: var(--green-deep); line-height: 1.55;
}

/* Things to do */
.things-section { padding: 1.5rem 0 0; }

.things-header {
  padding: 0 1.5rem 0.75rem;
  border-bottom: 1px solid var(--rule);
}

.things-label {
  font-size: 0.58rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint);
  margin-bottom: 0.2rem;
}

.things-sub {
  font-size: 0.65rem; color: var(--ink-faint); line-height: 1.5;
}

.thing-item {
  display: flex; gap: 1rem;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--rule);
  align-items: flex-start;
  transition: background 0.1s;
}

.thing-item:hover { background: var(--stone-pale); }

.thing-check {
  width: 22px; height: 22px;
  border: 1.5px solid var(--rule);
  border-radius: 4px; flex-shrink: 0;
  margin-top: 1px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center;
}

.thing-check.done { background: var(--green-mid); border-color: var(--green-mid); }
.thing-check.done::after {
  content: '';
  width: 11px; height: 6px;
  border-left: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.thing-body { flex: 1; }

.thing-action {
  font-family: 'Libre Baskerville', serif;
  font-size: 0.95rem; font-weight: 700;
  color: var(--ink); line-height: 1.3;
  margin-bottom: 0.3rem;
}

.thing-why {
  font-size: 0.7rem; color: var(--ink-mid); line-height: 1.55;
}

/* Bottom note */
.detail-note {
  margin: 1.25rem 1.5rem 0;
  padding: 0.85rem 1rem;
  background: var(--brass-pale);
  border-left: 3px solid var(--brass);
}

.note-label {
  font-size: 0.55rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--brass);
  margin-bottom: 0.35rem;
}

.note-text {
  font-size: 0.7rem; color: var(--ink-mid); line-height: 1.65;
}

.spacer { height: 5rem; }

/* Bottom nav hint on home */
.home-hint {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 1rem 1.5rem;
  background: var(--bg);
  border-top: 1px solid var(--rule);
  font-size: 0.6rem; color: var(--ink-faint);
  letter-spacing: 0.06em; text-align: center;
}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen" id="screen-home">
  <div class="home-hero">
    <div class="wordmark">Groundwork</div>
    <div class="home-question">What does a strong community actually need?</div>
    <div class="home-sub">Twelve things. Each one makes the next possible. Tap any to see what it is, why it matters, and what you can do.</div>
  </div>
  <div class="capacity-list" id="capacity-list"></div>
  <div class="home-hint">Tap any capacity to explore →</div>
</div>

<!-- ══ DETAIL ══ -->
<div class="screen hidden" id="screen-detail">
  <div class="detail-nav">
    <button class="back-btn" onclick="goHome()">← All capacities</button>
    <div class="detail-nav-name" id="d-nav-name"></div>
  </div>
  <div class="detail-color-bar" id="d-color-bar"></div>

  <div class="detail-hero">
    <div class="detail-label" id="d-label"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-question" id="d-question"></div>
    <div class="detail-why" id="d-why"></div>
  </div>

  <div class="detail-unlocks">
    <div class="unlocks-label">When a community builds this</div>
    <div class="unlocks-text" id="d-unlocks"></div>
  </div>

  <div class="things-section">
    <div class="things-header">
      <div class="things-label">Things anyone can do</div>
      <div class="things-sub" id="d-things-sub"></div>
    </div>
    <div id="d-things"></div>
  </div>

  <div class="detail-note">
    <div class="note-label">Worth knowing</div>
    <div class="note-text" id="d-note"></div>
  </div>

  <div class="spacer"></div>
</div>

<script>
const COLORS = [
  '#2E5C38','#8A7230','#1F3D28','#7A7468',
  '#3D7A48','#B09440','#2E5C38','#8A7230',
  '#1F3D28','#7A7468','#3D7A48','#B09440'
];

const CAPACITIES = [
  {
    num: 0,
    name: "Presence",
    question: "Can we find each other?",
    why: "Before anything else can happen, people have to know each other exists. A neighborhood where no one knows their neighbors is just people sharing a postcode. The moment people can find each other — know names, know who's around, know how to reach someone — everything else becomes possible.",
    unlocks: "The ability to ask for help, offer something, and start acting together instead of alone.",
    sub: "Start anywhere. The smallest act of showing up changes something.",
    note: "Communities get scattered on purpose. People are priced out, pushed out, or pulled away by systems that work better when neighbors don't know each other. Building presence is how a community starts to become legible to itself again.",
    things: [
      { action: "Learn your neighbors' names", why: "Names are the first unit of recognition. They make people real to each other." },
      { action: "Introduce yourself to someone new this week", why: "You can't belong to something you're invisible inside." },
      { action: "Show up to one local event", why: "Showing up says: I'm here and this place matters to me." },
      { action: "Start a building or block directory", why: "Knowing who's around makes it possible to reach each other when it counts." },
      { action: "Map who lives nearby and what they're good at", why: "Every neighborhood has more capacity than it knows." },
      { action: "Find out what community organizations already exist", why: "You don't have to start from scratch. Others already have." },
    ]
  },
  {
    num: 1,
    name: "Signal",
    question: "Can we see what's actually happening?",
    why: "Communities often don't know what they need until someone names it. Signal capacity is how a neighborhood stops being described by outsiders and starts describing itself. When people can share what they're seeing — what's working, what's missing, what's changing — the community can act on what it actually knows.",
    unlocks: "The shared awareness that lets problems get addressed before they become crises.",
    sub: "The goal is a community that sees itself clearly — not one that waits to be told what's happening.",
    note: "When outside voices define what's happening in a community, people stop trusting their own perception. Local knowledge is real knowledge. Building signal capacity is how communities reclaim the authority to name their own experience.",
    things: [
      { action: "Ask your neighbors what they need", why: "Asking is the first step to knowing. Don't assume." },
      { action: "Start a group chat or notice board", why: "Information shared stays in the community. Information unshared disappears." },
      { action: "Hold a listening session — just gather and hear people", why: "Some things only emerge when there's space to say them." },
      { action: "Map what resources exist in your neighborhood", why: "You can't share what you can't see." },
      { action: "Support local journalism or start a newsletter", why: "Communities that tell their own stories know what's actually happening." },
      { action: "Build a simple feedback channel people actually check", why: "A feedback channel no one reads is just a suggestion box." },
    ]
  },
  {
    num: 2,
    name: "Social",
    question: "Do we have reasons to come back to each other?",
    why: "Knowing someone exists is not the same as having a relationship with them. Social capacity is what turns visibility into connection — the regular contact and shared experience that makes trust possible. Without it, people remain friendly strangers. With it, they become a community.",
    unlocks: "The trust, belonging, and friendship that make it possible to ask more of each other — and give more in return.",
    sub: "Rhythm matters more than any single event. Something that keeps happening builds what a one-time event can't.",
    note: "Poverty, overwork, and precarity don't leave much room for gathering. When people are exhausted and stretched thin, community feels like a luxury. It isn't — but it has to be made easy enough that people can actually show up.",
    things: [
      { action: "Host a meal and invite people you don't know well", why: "Eating together is one of the oldest trust-building acts there is. It still works." },
      { action: "Start a recurring gathering — monthly is enough", why: "One-time events fade. Rhythm builds real relationship." },
      { action: "Build a shared calendar for your block or building", why: "Coordination is friction. Reduce it and more people can participate." },
      { action: "Create a welcoming ritual for newcomers", why: "New people need a signal that they were expected and are wanted." },
      { action: "Connect two people who should know each other but don't", why: "Isolation is the default. Someone has to actively break it." },
      { action: "Celebrate something together", why: "Marking what matters tells people their lives belong to this community." },
    ]
  },
  {
    num: 3,
    name: "Repair",
    question: "Can we recover when things go wrong?",
    why: "Trust breaks. People disagree. Harm happens. Communities that have no way to address these things don't become conflict-free — they become places where conflict goes underground. Repair capacity is what keeps a rupture from becoming permanent. It's what lets people stay in community with each other through hard things.",
    unlocks: "The ability to face conflict without losing people — and to emerge from failure having learned something.",
    sub: "Most communities know how to grow. Very few know how to recover. This is how.",
    note: "Most communities once had ways to address conflict from within. Those practices were replaced by systems that remove people rather than restore relationships. Repair capacity is older than what replaced it — and more effective.",
    things: [
      { action: "When conflict happens, name it instead of avoiding it", why: "Conflict that goes unaddressed doesn't disappear — it just becomes the atmosphere." },
      { action: "Ask: what would it take for everyone to feel okay continuing together?", why: "That question opens a door that punishment closes." },
      { action: "Create a regular space where concerns can be raised", why: "Problems addressed early don't become ruptures." },
      { action: "Make it possible for people to apologize and come back", why: "If there's no path back, people don't try to find one." },
      { action: "When something goes wrong, ask what you'd do differently — together", why: "Failure that produces learning is not wasted." },
      { action: "Name someone trusted who can help mediate when needed", why: "Conflict without a process defaults to whoever is most powerful." },
    ]
  },
  {
    num: 4,
    name: "Knowledge",
    question: "Can we learn from each other?",
    why: "Every person in a community holds knowledge that others need. The plumber who knows how to fix the boiler. The elder who remembers what this neighborhood used to be. The teenager who speaks three languages. Knowledge capacity is what makes that distributed expertise available to everyone — instead of each person solving alone what others have already figured out.",
    unlocks: "The collective intelligence, skill transfer, and retained wisdom that let a community grow without depending on outside expertise.",
    sub: "The goal is a community that teaches itself. Start with what you know and who needs it.",
    note: "Communities that taught themselves were made dependent on outside credentials. Local expertise was devalued. What people knew about their own places stopped being passed on. Building knowledge capacity is how communities reclaim the authority of their own experience.",
    things: [
      { action: "Teach someone something you know how to do", why: "Every person here knows something others need. Share it." },
      { action: "Start a skill-share: one person teaches, others learn", why: "Learning together builds more than competence — it builds connection." },
      { action: "Find someone to learn from in your neighborhood", why: "Knowledge that stays local serves local needs." },
      { action: "Write down something important that only you know", why: "If it's only in your head, it leaves when you do." },
      { action: "Connect young people with people who have experience", why: "Experience shouldn't retire when people do." },
      { action: "Start collecting stories from long-time residents", why: "The people who remember what this place was are getting older. Start now." },
    ]
  },
  {
    num: 5,
    name: "Resource",
    question: "Can we share what we already have?",
    why: "Individual ownership is expensive. Most tools sit unused most of the time. Most cars have empty seats. Most people who need something and people who have it never find each other. Resource capacity is what changes that — turning individual possessions into community infrastructure, and reducing what each person needs to own alone.",
    unlocks: "Reduced costs for everyone, greater access across the community, and the material foundation for more ambitious things.",
    sub: "The most important resources are the ones sitting idle in someone's garage or going unasked for.",
    note: "The privatization of shared resources is one of the oldest tools of economic control. Commons were fenced. Communities that managed things together were forced into individual dependency. Sharing what we have is not radical — it's a recovery of how most human communities have always worked.",
    things: [
      { action: "Start a tool library with neighbors", why: "Most tools sit unused 95% of the time. Share the other 5%." },
      { action: "Offer a ride to someone who needs one", why: "Transportation gaps isolate people from everything that requires getting somewhere." },
      { action: "Buy something together with neighbors instead of separately", why: "Buying together makes quality affordable for people who couldn't afford it alone." },
      { action: "Share childcare time with another family", why: "Childcare costs collapse when trust allows trading hours instead of money." },
      { action: "Start a seed or book library for the block", why: "Knowledge and food sovereignty shouldn't require individual ownership." },
      { action: "Ask what people need before assuming they're fine", why: "Unmet needs that stay invisible can't be addressed." },
    ]
  },
  {
    num: 6,
    name: "Production",
    question: "Can we make things together?",
    why: "A community that only consumes remains dependent on systems outside itself. Production capacity is what changes that — letting a community generate food, goods, services, media, and knowledge, and keep the value of that production inside rather than sending it somewhere else.",
    unlocks: "Local production, shared ownership of what the community makes, and an economic resilience that doesn't rely on outside systems to function.",
    sub: "Start with what the community already has energy for. Even a garden is a form of production.",
    note: "Local economies were absorbed into larger ones that extracted value outward. What communities made stopped belonging to them. When we make things together and own them together, value stays where it was created. That's what economic resilience actually looks like.",
    things: [
      { action: "Start a community garden on any available land", why: "Growing food together builds food security and daily relationship at the same time." },
      { action: "Open a repair session — bring broken things, fix them together", why: "Fixing instead of replacing keeps money and skills inside the community." },
      { action: "Form a buying cooperative for things you all need regularly", why: "Collective purchasing shifts the economic relationship with every supplier." },
      { action: "Start a community newsletter or media project", why: "Communities that tell their own stories shape their own futures." },
      { action: "Pool skills to offer a service cooperatively", why: "Worker ownership means profit stays with the people who created it." },
      { action: "Create something together that belongs to everyone", why: "Shared ownership changes the relationship people have with what they've made." },
    ]
  },
  {
    num: 7,
    name: "Care",
    question: "Can we support each other through life?",
    why: "People can't participate in community life when they're in crisis alone. Care capacity is what ensures that illness, loss, new parenthood, disability, and hardship don't pull people out of the community permanently. It's what makes belonging feel real when it's actually tested.",
    unlocks: "Human dignity, reduced isolation, and a safety net that reaches people before they fall through.",
    sub: "The goal is a community where no one has to manage their hardest moments alone. Start with whoever is struggling right now.",
    note: "Care was privatized. What families and communities once held together was either commodified or left to individuals to manage alone. The village was replaced by the market and the state, neither of which does it as well. Care capacity is how communities take back what was outsourced.",
    things: [
      { action: "Organize a meal train for someone going through something hard", why: "When someone is overwhelmed, food is the most concrete help you can give." },
      { action: "Check in on an elder neighbor regularly", why: "Isolation is a health crisis. Showing up is a form of treatment." },
      { action: "Offer to watch a neighbor's kids so they can rest", why: "Shared childcare makes work, rest, and participation possible for more people." },
      { action: "Ask someone how they're actually doing — and stay for the answer", why: "Being seen matters. Most people are asked but not heard." },
      { action: "Build a list of who can help with what in a crisis", why: "Knowing who to call before you need to call them is care infrastructure." },
      { action: "Support someone who is grieving beyond the funeral", why: "Grief lasts longer than sympathy. Communities can hold it when individuals can't." },
    ]
  },
  {
    num: 8,
    name: "Resilience",
    question: "Can we hold together when things get hard?",
    why: "Disruption is inevitable. Storms, economic shocks, political upheaval, public health crises. Resilience capacity is what determines whether a community survives those disruptions intact — or fragments under pressure. The communities that hold together are the ones that built connections and systems before they needed them.",
    unlocks: "The adaptability, preparedness, and continuity that let a community face hard events without losing what it's built.",
    sub: "The infrastructure that matters most in a crisis is the kind that gets built before one arrives.",
    note: "Disaster response has historically reached some communities last. The people with the least margin absorb the most damage. Resilience built from within reaches everyone — it doesn't wait for a system that has historically arrived late, or not at all.",
    things: [
      { action: "Know your neighbors well enough to check on each other in an emergency", why: "When infrastructure goes down, knowing who to reach is what saves people." },
      { action: "Learn basic first aid", why: "The first minutes after an emergency happen before help can arrive." },
      { action: "Build a simple group communication channel for emergencies", why: "In a crisis, the ability to reach each other quickly is everything." },
      { action: "Create a small mutual aid fund for neighbors in sudden need", why: "Cash held in community hands reaches crises faster than any institution." },
      { action: "Know who in your community would need help evacuating", why: "People without cars need neighbors who have them and will use them." },
      { action: "Stock a few extra days of food and water", why: "Three days of disruption exposes how thin most households' margins are." },
    ]
  },
  {
    num: 9,
    name: "Governance",
    question: "Can we make decisions together?",
    why: "Communities that can't decide together get decided for. Governance capacity is what makes self-determination real — the difference between a community that shapes its own conditions and one that simply has conditions imposed on it. It doesn't require formal structures. It requires practice.",
    unlocks: "The self-determination, legitimacy, and collective agency to shape what happens here rather than having it shaped for you.",
    sub: "Governance isn't a structure you install. It's a capacity you build through repeated use. Start with the smallest decision you can make together.",
    note: "Self-governing communities were brought under external control because self-determination is power. Decisions that communities once made for themselves were moved to institutions that didn't answer to them. Governing ourselves is not a new idea — it's what most human communities did before that capacity was removed.",
    things: [
      { action: "Hold a community meeting where everyone gets to speak", why: "Decisions made together are decisions people will actually follow." },
      { action: "Let the people most affected by a decision shape it", why: "Whoever is closest to the impact usually knows the most about it." },
      { action: "Write down what you've agreed — even informally", why: "Accountability requires documentation. Memory is not enough." },
      { action: "Rotate who leads things instead of always the same person", why: "Concentrated power is a single point of failure. Distribute it." },
      { action: "Create a way for people to raise concerns that actually gets heard", why: "Without feedback, decisions disconnect from their effects." },
      { action: "Try deciding something by consensus rather than majority", why: "Majority rule leaves minorities behind. Consensus doesn't have to." },
    ]
  },
  {
    num: 10,
    name: "Stewardship",
    question: "Can we improve what we've inherited?",
    why: "The places we share are part of the community. A neighborhood with declining shared spaces, damaged ecology, and lost history is a neighborhood whose capacity for collective life is eroding. Stewardship capacity is how a community re-enters a relationship with the places it inhabits — tending rather than just occupying.",
    unlocks: "Deeper attachment to place, ecological health that sustains people, and the long-term care that makes what's been built worth inheriting.",
    sub: "Some of what we plant now, others will benefit from later. That's the point.",
    note: "Land that communities tended for generations was taken, sold, and degraded. The relationship between people and the places they lived — built over centuries — was severed in a generation. What replaced it treated land as property rather than as something we belong to.",
    things: [
      { action: "Plant something — a tree, a garden, a pollinator patch", why: "Planting is an act of participation that extends past your own time here." },
      { action: "Maintain a shared public space in your neighborhood", why: "Cared-for spaces signal that people here pay attention." },
      { action: "Learn the history of where you live", why: "Places with stories are harder to erase and easier to defend." },
      { action: "Make shared spaces more accessible for people with disabilities", why: "A community is only as accessible as its least accessible path." },
      { action: "Reduce waste together rather than individually", why: "Shared systems outperform individual effort by orders of magnitude." },
      { action: "Walk the routes people use and notice what needs tending", why: "The routes people walk together are where community forms." },
    ]
  },
  {
    num: 11,
    name: "Generational",
    question: "Will what we've built outlast us?",
    why: "The deepest form of participation is acting on behalf of people who aren't here yet. Generational capacity is what transforms a community from a project of its current members into something that belongs to the place — and to everyone who will ever live in it. It means thinking beyond your own tenure.",
    unlocks: "Continuity, legacy, and the kind of community that doesn't have to be rebuilt from scratch by every generation.",
    sub: "The goal is a community that doesn't depend on any particular person to survive. Start by thinking about who comes after you.",
    note: "Languages were suppressed. Traditions were interrupted. Children were removed from the communities that would have taught them who they were. The transmission of knowledge and practice across generations was deliberately broken in communities all over the world. Generational capacity is the recovery of that continuity.",
    things: [
      { action: "Teach something you know to someone younger", why: "Capacity transferred to the next generation is the only kind that truly lasts." },
      { action: "Make sure someone else knows how to do what only you do", why: "Every role held by one person is a fragility. Build the handoff." },
      { action: "Collect stories from the oldest people in your community", why: "The people who remember are aging. Start now." },

// ── NAV ──
function openCapacity(num) {
  const C = CAPACITIES[num];
  const color = COLORS[num];

  document.getElementById('d-nav-name').textContent = C.name;
  document.getElementById('d-color-bar').style.background = color;
  document.getElementById('d-label').textContent = `Capacity ${num} of 11`;
  document.getElementById('d-label').style.color = color;
  document.getElementById('d-name').textContent = C.name + ' Capacity';
  document.getElementById('d-question').textContent = C.question;
  document.getElementById('d-why').textContent = C.why;
  document.getElementById('d-unlocks').textContent = C.unlocks;
  document.getElementById('d-things-sub').textContent = C.sub;
  document.getElementById('d-note').textContent = C.note;

  document.getElementById('d-things').innerHTML = C.things.map(t => `
    <div class="thing-item">
      <div class="thing-check" onclick="this.classList.toggle('done')"></div>
      <div class="thing-body">
        <div class="thing-action">${t.action}</div>
        <div class="thing-why">${t.why}</div>
      </div>
    </div>
  `).join('');

  const detail = document.getElementById('screen-detail');
  const home = document.getElementById('screen-home');
  home.classList.add('slide-left');
  detail.classList.remove('hidden');
  detail.scrollTop = 0;
}

function goHome() {
  const detail = document.getElementById('screen-detail');
  const home = document.getElementById('screen-home');
  detail.classList.add('hidden');
  home.classList.remove('slide-left');
}

// ── BUILD LIST ──
document.getElementById('capacity-list').innerHTML = CAPACITIES.map(C => `
  <div class="capacity-row" onclick="openCapacity(${C.num})">
    <div class="row-accent" style="background:${COLORS[C.num]}"></div>
    <div class="row-inner">
      <div class="row-name">${C.name}</div>
      <div class="row-question">${C.question}</div>
    </div>
    <div class="row-arrow">›</div>
  </div>
`).join('');
</script>
