<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verification Capture — Diagnostic</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #1a1a18;
  --cream: #f2ede4;
  --warm: #e8e0d0;
  --paper: #faf7f2;
  --muted: #7a7060;
  --rule: #d8d0c0;
  --brown: #1e1a14;

  --teal: #2a6b5e;
  --teal-lt: #eaf4f1;

  --gold: #a07840;
  --gold-lt: #fdf5e8;

  --rust: #8b3a2a;
  --rust-lt: #fdf0ee;
}

body {
  font-family: "DM Sans", sans-serif;
  font-size: 16px;
  line-height: 1.65;
  color: var(--ink);
  background: var(--cream);
  max-width: 600px;
  margin: 0 auto;
}

/* HEADER */
.header {
  background: var(--brown);
  padding: 44px 28px 40px;
}

.header-title {
  font-family: "Libre Baskerville", serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--paper);
}

.header-sub {
  font-size: 15px;
  color: #807060;
}

/* PROGRESS */
.progress-bar { height: 3px; background: var(--rule); }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--gold));
  width: 0%;
  transition: width 0.35s ease;
}

/* BLOCKS */
.block {
  padding: 32px 28px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
}

.block.warm { background: var(--warm); }

/* INPUT */
.subject-input,
.notes-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--rule);
  background: var(--paper);
  font-family: "DM Sans", sans-serif;
  font-size: 16px;
  color: var(--ink);
}

/* OPTIONS */
.option {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  border: 1.5px solid var(--rule);
  background: var(--paper);
  cursor: pointer;
}

.option.sel-clean { border-color: var(--teal); background: var(--teal-lt); }
.option.sel-unclear { border-color: var(--gold); background: var(--gold-lt); }
.option.sel-risk { border-color: var(--rust); background: var(--rust-lt); }

/* BUTTONS */
.run-btn {
  width: 100%;
  padding: 18px;
  background: var(--ink);
  color: var(--paper);
  font-size: 16px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

</style>
</head>

<body>

<div class="header">
  <div class="header-title">Is this system structurally compromised?</div>
  <div class="header-sub">Diagnostic tool for verification capture patterns.</div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="block">
  <input class="subject-input" id="subjectInput" placeholder="Name the system..." oninput="updateProgress()" />
</div>

<div class="block warm">

<!-- Q1 -->
<div class="question-block active" id="q1block">
  <div>Who funds the verifier?</div>
  <div class="options">

    <label class="option" id="q1-clean">
      <input type="radio" name="q1" value="clean" onchange="selectOption('q1','clean')">
      Independent funding
    </label>

    <label class="option" id="q1-unclear">
      <input type="radio" name="q1" value="unclear" onchange="selectOption('q1','unclear')">
      Mixed or unclear funding
    </label>

    <label class="option" id="q1-risk">
      <input type="radio" name="q1" value="risk" onchange="selectOption('q1','risk')">
      Subject funds verifier
    </label>

  </div>
</div>

</div>

<div class="block">
  <textarea class="notes-input" id="notesInput" placeholder="Context..."></textarea>
</div>

<div class="block">
  <button class="run-btn" id="runBtn" onclick="runDiagnostic()" disabled>
    Run Diagnostic
  </button>
</div>

<script>
const answers = { q1:null, q2:null, q3:null, q4:null };

function selectOption(q, val){
  answers[q] = val;

  document.querySelectorAll("#"+q+"block .option")
    .forEach(o => o.classList.remove("sel-clean","sel-unclear","sel-risk"));

  document.getElementById(q+"-"+val).classList.add("sel-"+val);

  checkReady();
  updateProgress();
}

function updateProgress(){
  const done = Object.values(answers).filter(Boolean).length;
  document.getElementById("progressFill").style.width = (done/4)*100 + "%";
}

function checkReady(){
  document.getElementById("runBtn").disabled =
    !Object.values(answers).every(Boolean);
}

function runDiagnostic(){
  alert("Diagnostic running — core system intact.");
}
</script>

</body>
</html>
